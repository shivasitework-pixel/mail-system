<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox - Shiva Mail</title>

<link rel="stylesheet" href="inbox.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="sidebar">

<h2>📧 Shiva Mail</h2>

<ul>

<li class="active">📥 Inbox</li>

<li>⭐ Starred</li>

<li>📤 Sent</li>

<li>📝 Drafts</li>

<li>🗑 Trash</li>

</ul>

</div>

<div class="main">

<div class="topbar">

<input type="text" placeholder="Search mail...">

<button>Compose</button>

</div>

<div class="mail-list">

<div class="mail">

<strong>OpenAI</strong>

<span>Welcome to Shiva Mail System</span>

<small>Today</small>

</div>

<div class="mail">

<strong>GitHub</strong>

<span>Your repository is ready.</span>

<small>Yesterday</small>

</div>

<div class="mail">

<strong>Admin</strong>

<span>Your account has been created.</span>

<small>20 Jun</small>

</div>

</div>

</div>

</body>
</html>
